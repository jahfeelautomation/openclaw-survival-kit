# Example gateway-keeper config. Copy to gateway-keeper.yaml and edit.
# Missing keys fall back to defaults baked into gateway_keeper.py.

gateway:
  command: ["openclaw", "gateway", "start"]
  working_dir: "~/.openclaw"
  health_url: "http://localhost:18789/healthz"
  env:
    # Fix for upstream issue #47931 — 3s handshake timeout is too aggressive
    DEFAULT_HANDSHAKE_TIMEOUT_MS: "15000"
    # Fix for upstream issue #30183 — disable bonjour/mDNS discovery loop
    OPENCLAW_DISCOVERY_MDNS_MODE: "off"

watchdog:
  check_interval_seconds: 30
  failures_before_restart: 3
  backoff_after_restarts: 3
  backoff_window_seconds: 300
  backoff_pause_seconds: 60
  shutdown_grace_seconds: 10

# Optional: keep WebSocket connections warm (fix for upstream issue #51010)
keepalive:
  enabled: true
  ping_interval_seconds: 45

log:
  # path: null  # auto-detect per OS; override with an absolute path if you want
  max_size_mb: 50
  rotate_keep: 5

metrics:
  enabled: false
  port: 9091
